services:
  # Backend API
  - type: web
    name: fitchain-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_PATH
        value: ./database/stellar_strider.db
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: fitchain-frontend
          type: web
          property: host

  # Frontend (static site)
  - type: web
    name: fitchain-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: fitchain-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
